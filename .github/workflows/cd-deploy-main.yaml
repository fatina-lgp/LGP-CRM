name: LGP CRM — Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  GCP_REGION: us-east1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  API_IMAGE: us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lgp-crm/lgp-crm-api
  WEB_IMAGE: us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lgp-crm/lgp-crm-web
  API_SERVICE: lgp-crm-api
  WEB_SERVICE: lgp-crm-web

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy LGP CRM
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & Push API ─────────────────────────────────────────────────
      - name: Build & Push lgp-crm-api
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.API_IMAGE }}:cache,mode=max

      # ── Build & Push Web ─────────────────────────────────────────────────
      - name: Build & Push lgp-crm-web
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.SERVER_BASE_URL }}
          cache-from: type=registry,ref=${{ env.WEB_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.WEB_IMAGE }}:cache,mode=max

      # ── Deploy API to Cloud Run ──────────────────────────────────────────
      - name: Deploy lgp-crm-api
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.API_IMAGE }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --port=3000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_INSTANCE }}
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}
          env_vars: |
            NODE_ENV=production
            REDIS_URL=${{ secrets.REDIS_URL }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          secrets: |
            DATABASE_URL=PG_DATABASE_URL:latest
            JWT_SECRET=APP_SECRET:latest

      # ── Deploy Web to Cloud Run ──────────────────────────────────────────
      - name: Deploy lgp-crm-web
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.WEB_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.WEB_IMAGE }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --port=80
            --memory=128Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Report URLs ──────────────────────────────────────────────────────
      - name: Report deployed URLs
        run: |
          API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} --region=${{ env.GCP_REGION }} --format='value(status.url)')
          WEB_URL=$(gcloud run services describe ${{ env.WEB_SERVICE }} --region=${{ env.GCP_REGION }} --format='value(status.url)')
          echo "✅ LGP CRM API: $API_URL"
          echo "✅ LGP CRM Web: $WEB_URL"
