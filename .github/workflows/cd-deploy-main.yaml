name: LGP CRM — Deploy to GCP Cloud Run

on:
  push:
    branches: [main]

env:
  GCP_REGION: us-east1
  # Artifact Registry path — images are named lgp-crm-api and lgp-crm-web
  API_IMAGE: us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lgp-crm/lgp-crm-api
  WEB_IMAGE: us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lgp-crm/lgp-crm-web
  # Cloud Run service names
  API_SERVICE: lgp-crm-api
  WEB_SERVICE: lgp-crm-web

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation

jobs:
  deploy:
    name: Build & Deploy LGP CRM
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout LGP CRM
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP via Workload Identity (no static keys) ───
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── 3. Configure Docker for Artifact Registry ────────────────────────
      - name: Configure Docker
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      # ── 4. Set up Docker Buildx ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Build & Push — LGP CRM API (server) ──────────────────────────
      - name: Build & Push lgp-crm-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.API_IMAGE }}:cache,mode=max

      # ── 6. Build & Push — LGP CRM Web (frontend) ────────────────────────
      - name: Build & Push lgp-crm-web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.front
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_SERVER_BASE_URL=${{ secrets.SERVER_BASE_URL }}
          cache-from: type=registry,ref=${{ env.WEB_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.WEB_IMAGE }}:cache,mode=max

      # ── 7. Deploy lgp-crm-api to Cloud Run ──────────────────────────────
      - name: Deploy lgp-crm-api
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.API_IMAGE }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --port=3000
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_INSTANCE }}
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}
          env_vars: |
            NODE_ENV=production
          secrets: |
            PG_DATABASE_URL=PG_DATABASE_URL:latest
            APP_SECRET=APP_SECRET:latest
            FRONTEND_URL=FRONTEND_URL:latest

      # ── 8. Deploy lgp-crm-web to Cloud Run ──────────────────────────────
      - name: Deploy lgp-crm-web
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.WEB_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.WEB_IMAGE }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --port=80
            --memory=256Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── 9. Report deployed URLs ──────────────────────────────────────────
      - name: Report deployment URLs
        run: |
          API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} --region=${{ env.GCP_REGION }} --format='value(status.url)')
          WEB_URL=$(gcloud run services describe ${{ env.WEB_SERVICE }} --region=${{ env.GCP_REGION }} --format='value(status.url)')
          echo "✅ LGP CRM API:  $API_URL"
          echo "✅ LGP CRM Web:  $WEB_URL"
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "web_url=$WEB_URL" >> $GITHUB_OUTPUT
